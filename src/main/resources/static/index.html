<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentPages — Сучасна Цифрова Бібліотека</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <div class="navbar-brand">
        <span class="brand-icon">📚</span>
        <span class="brand-name">Silent<span>Pages</span></span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Шукати книгу за назвою або автором...">
        <button id="searchBtn">
            <span class="search-icon">🔍</span>
        </button>
    </div>

    <div class="nav-actions" id="navActions">
        <a href="login.html" class="btn-login">Увійти</a>
        <a href="register.html" class="btn-register">Реєстрація</a>
    </div>
</header>

<section class="hero-section">
    <div class="hero-content">
        <h1>Твій затишний простір для читання</h1>
        <p>Досліджуй сотні дивовижних історій, керуй своїми книгами та відкривай нові світи разом із SilentPages.</p>
    </div>
</section>

<div class="main-layout">

    <aside class="sidebar">
        <div class="sidebar-block">
            <h3>📁 Категорії та Жанри</h3>
            <ul class="filter-list" id="genreFilter">
                <li class="active" data-genre="all">Всі жанри</li>
            </ul>
        </div>

        <div class="sidebar-block">
            <h3>🌐 Мова видання</h3>
            <ul class="filter-list" id="languageFilter">
                <li class="active" data-lang="all">Будь-яка</li>
                <li data-lang="Українська">Українська</li>
                <li data-lang="English">English</li>
            </ul>
        </div>
    </aside>

    <main class="content-area">
        <div class="content-header">
            <h2>Каталог видань</h2>
            <span class="results-count" id="resultsCount">Завантаження...</span>
        </div>

        <div id="catalog" class="books-grid">
        </div>
    </main>
</div>

<script src="js/catalog.js"></script>
</body>
</html>
