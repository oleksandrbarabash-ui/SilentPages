<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід — SilentPages</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar">
  <div class="navbar-brand">
    <a href="index.html" style="color: white; text-decoration: none;">
      <span class="brand-icon">📚</span>
      <span class="brand-name">Silent<span>Pages</span></span>
    </a>
  </div>
  <div class="nav-actions">
    <a href="index.html" class="btn-login">На головну</a>
    <a href="register.html" class="btn-register">Реєстрація</a>
  </div>
</header>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>З поверненням!</h2>

    <div id="loginAlert" class="alert alert-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Електронна пошта</label>
        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" class="form-control" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit">Увійти</button>
    </form>

    <div class="auth-links">
      Ще немає акаунта? <a href="register.html">Зареєструватися</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
